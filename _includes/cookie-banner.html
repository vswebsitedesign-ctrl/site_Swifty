<div id="cookie-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#3d5a80;color:#fff;padding:16px 24px;z-index:9999;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;font-size:14px;">
  <p style="margin:0;flex:1 1 260px;">We use cookies to improve your experience. By continuing to use this site you accept our use of cookies. <a href="/privacy-policy/" style="color:#90ee90;text-decoration:underline;">Privacy Policy</a></p>
  <button id="cookie-accept" style="background:#90ee90;color:#1a5c2a;border:none;padding:10px 24px;border-radius:4px;font-weight:700;cursor:pointer;white-space:nowrap;">Accept</button>
</div>
<script>
  (function(){
    if(!localStorage.getItem('cookie_accepted')){
      document.getElementById('cookie-banner').style.display='flex';
    }
    document.getElementById('cookie-accept').addEventListener('click',function(){
      localStorage.setItem('cookie_accepted','1');
      document.getElementById('cookie-banner').style.display='none';
    });
  })();
</script>
